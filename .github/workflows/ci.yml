name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun pm audit || true # report, do not block on advisories without a fix

      - name: Validate mechanism data (schema + overrides stale-hash + content lint)
        run: bun run validate

      - name: Lint (incl. innerHTML XSS ban)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Bundle-size gate
        run: bun run size

  # Reproducible-build check (Eng E18/F12): two clean builds must be byte-identical.
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Build twice and diff
        run: |
          bun run build
          mv dist dist-1
          bun run build
          mv dist dist-2
          if diff -r dist-1 dist-2 > /dev/null; then
            echo "✓ reproducible: two builds are byte-identical"
          else
            echo "✗ builds differ between runs — non-deterministic output"
            diff -r dist-1 dist-2 || true
            exit 1
          fi
