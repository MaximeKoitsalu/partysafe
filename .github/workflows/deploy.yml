name: Deploy to GitHub Pages

# Manual-trigger only while the repo is private and the ship gates (clinical
# review, legal review, distribution) are open. GitHub Pages requires a public
# repo on the free plan, so an automatic push trigger would fail on every push.
#
# AT LAUNCH: once the repo is public and the ship gates are cleared, restore the
# automatic trigger by uncommenting the `push` block below — every merge to main
# then deploys.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let in-progress finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - name: Build
        # Base path defaults to /partysafe/ (the repo name) for project Pages.
        run: bun run build
      - name: Bundle-size gate
        run: bun run size
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
