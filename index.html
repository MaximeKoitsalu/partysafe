<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />

    <!--
      Privacy + security hardening (PLAN.md Eng E9-E11):
      - referrer no-referrer  : prevents combo slugs leaking via Referer header to
                                external links (e.g. PsychonautWiki/TripSit clicks).
      - CSP                   : default-src 'self'; restricts XSS blast radius if a
                                regression slips past the ESLint innerHTML ban.
                                style-src includes 'unsafe-inline' for Vite's
                                dev style injection; revisit if we eliminate it.
    -->
    <meta name="referrer" content="no-referrer" />
    <!--
      frame-ancestors is intentionally omitted here: browsers ignore it when
      delivered via <meta> (it's header-only). It ships in public/_headers for
      hosts that support response headers (Cloudflare Pages, Netlify). The meta
      CSP below covers the directives that ARE honored in markup.
      connect-src is 'self' only — all datasets are emitted as real files (see
      vite.config.ts assetsInlineLimit: 0), never data: URIs.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none';"
    />

    <title>partysafe — combo information for harm reduction</title>
    <meta
      name="description"
      content="Pick 2-4 substances to see how they interact. Mechanism explanations, timing, and emergency resources. Not medical advice. Built on TripSit data."
    />

    <!--
      OG card is intentionally severity-free (Design D12 + CEO #25).
      No "this combo is safe" framing in social shares, and no region-specific
      emergency number (don't assume the visitor's country — see lib/emergency.ts).
    -->
    <meta property="og:title" content="partysafe — combo information" />
    <meta
      property="og:description"
      content="Combo info for harm reduction. Mechanism explanations, timing, and emergency resources. Not medical advice. In an emergency, call your local emergency number."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Self-hosted fonts (Eng F8). Subsetting script in scripts/subset-fonts.ts (added in M1).
      For now, ship system fonts; subsetted woff2 lands when the script runs.
    -->
    <link rel="stylesheet" href="/src/styles/tailwind.css" />
  </head>
  <body>
    <!-- Skip link: first focusable element, jumps keyboard users past the top bar. -->
    <a href="#app" class="skip-link">Skip to content</a>

    <!-- Top bar: brand + menu. Emergency moves to sticky bottom bar (Design C2). -->
    <header class="top-bar" role="banner">
      <div id="top-bar-mount"></div>
    </header>

    <!-- Main content mount point. Components render into here at runtime. -->
    <main id="app" role="main" tabindex="-1">
      <noscript>
        <div style="max-width: 40rem; margin: 0 auto; padding: 2rem 1rem">
          <h1>partysafe needs JavaScript</h1>
          <p>
            This is a static, privacy-first app — all logic runs in your browser, so it needs
            JavaScript enabled. No data is ever sent to a server.
          </p>
          <p>
            In an emergency, call your local emergency number now (112 across most of the world,
            911 in North America, 999 in the UK, 000 in Australia).
          </p>
        </div>
      </noscript>
    </main>

    <!--
      Sticky emergency action bar (Design D8 + C2).
      Renders into here at runtime so layout adapts to dark/light mode.
      The CSS pre-reserves 4rem padding-bottom on body so scrolled content
      isn't hidden behind it.
    -->
    <div id="emergency-bar-mount" class="sticky-emergency-bar" aria-label="Emergency"></div>

    <!--
      Entry script. Vite resolves /src/main.ts in dev; production builds emit
      hashed chunks under /assets/.
    -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
